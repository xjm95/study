<!doctype html>
<html>

<title>无标题文档</title>
<style type="text/css">
#left {
	width: 200px;
	height: 300px;
	background-color: #C9C2C2;

}

	width: 200px;

	height: 300px;
	background-color: #C9C2C2;
	border: 2px solid #0066FF;
	margin: 0px 204px 0px 204px;
}

</head>

<body>

<div id="left">左列</div>
<div id="main">中列</div>
