<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Untitled Document</title>
<!-- Bootstrap -->
<link href="css/bootstrap.css" rel="stylesheet">
<link href="css/main.css" rel="stylesheet" type="text/css">

<!-- HTML5 shim and Respond.js for IE8 support of HTML5 elements and media queries -->
<!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
<!--[if lt IE 9]>
		  <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
		  <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
		<![endif]-->
</head>
<body>
<!-- jQuery (necessary for Bootstrap's JavaScript plugins) --> 
<script src="js/jquery-1.11.3.min.js"></script> 

<!-- Include all compiled plugins (below), or include individual files as needed --> 
<script src="js/bootstrap.js"></script>
<div class="container-fluid text-center">
  <div id="title">
    <h1>用户注册</h1>
  </div>
  <form action="regin.asp" method="post" target="_parent">
    <div class="form-group">
      <div class="row">
        <div class="col-md-4 col-sm-4 col-xs-4 control-label text-right">
          <label  for="username">用户名：</label>
        </div>
        <div class="col-md-4 col-sm-6 col-xs-7 text-left">
          <input type="text" name="username" class="form-control" required="required" id="username" placeholder="请输入用户名">
        </div>
        <div class="col-md-4 col-sm-2 col-xs-1"></div>
      </div>
    </div>
    <div class="form-group">
      <div class="row">
        <div class="col-md-4 col-sm-4 col-xs-4 control-label text-right">
          <label  for="pwd">设置密码：</label>
        </div>
        <div class="col-md-4 col-sm-6 col-xs-7 text-left">
          <input type="password" name="password" class="form-control" required="required" id="pwd"  placeholder="请输入密码">
        </div>
        <div class="col-md-4 col-sm-2 col-xs-1"></div>
      </div>
    </div>
    <div class="form-group">
      <div class="row">
        <div class="col-md-4 col-sm-4 col-xs-4 control-label text-right">
          <label  for="repwd">确认密码：</label>
        </div>
        <div class="col-md-4 col-sm-6 col-xs-7 text-left">
          <input type="password" name="repassword" class="form-control" required="required" id="repwd"  placeholder="再次确认密码">
        </div>
        <div class="col-md-4 col-sm-2 col-xs-1"></div>
      </div>
    </div>
    
    <div class="form-group">
      <div class="row">
        <div class="col-md-4 col-sm-4 col-xs-4 control-label text-right">
          <label for="tel">联系方式：</label>
        </div>
        <div class="col-md-4 col-sm-6 col-xs-7 text-left">
          <input type="tel" name="tel" class="form-control" required="required" id="tel"  placeholder="请输入联系方式">
        </div>
        <div class="coll-md-4 col-sm-2 col-xs-1"></div>
      </div>
    </div>
    <div class="form-group">
      <div class="row">
        <div class="col-md-4 col-sm-4 col-xs-4 control-label text-right">
          <label for="email">电子邮箱：</label>
        </div>
        <div class="col-md-4 col-sm-6 col-xs-7 text-left">
          <input type="email" name="email" class="form-control" required="required" id="email"  placeholder="请输入邮箱地址">
        </div>
        <div class="coll-md-4 col-sm-2 col-xs-1"></div>
      </div>
    </div>
    <div class="row">
      <div class="col-md-12">
        <button type="submit" class="btn btn-default">提交</button>
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        <button type="reset" class="btn btn-default">重置</button>
      </div>
    </div>
  </form>
</div>
</body>
</html>
