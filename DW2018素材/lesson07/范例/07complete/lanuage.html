      <td height="100" align="center" valign="middle" class="text">花语是各国、各民族根据各种植物，尤其是花卉的特点、习性和传说典故，赋予的各种不同的人性化象征意义。是人们用花来表达人的语言、某种感情与愿望，在一定的历史条件下逐渐约定俗成的，为一定范围人群所公认的信息交流形式。赏花要懂花语，花语构成花卉文化的核心，在花卉交流中，花语虽无声，但此时无声胜有声，其中的涵义和情感表达甚于言语。</td>
