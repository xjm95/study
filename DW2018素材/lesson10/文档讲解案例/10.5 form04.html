<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>无标题文档</title>
</head>

<body>
	<form action="#" autocomplete="on">
		<p>姓名：<input name="name" type="text" required="required" id="name"></p>
		<p>密码：<input name="pwd" type="password" id="pwd" autocomplete="off"></p>
		<p>邮箱：<input name="email" type="email" autofocus="autofocus" id="email"></p>
		<p>网址：<input name="url" type="url" id="url"></p>
		<p>上传文件：<input type="file" multiple="multiple"></p>
		<p><input name="btn" type="submit" id="btn" value="提交"></p>
	</form>
</body>
</html>
