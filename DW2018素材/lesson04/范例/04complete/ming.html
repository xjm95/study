      <td width="1000" height="200" class="song">明朝有将近三百年的历史，从它的开国皇帝朱元璋征讨杀伐开始，到亡国皇帝崇祯上吊结束。其中的每个局都是这段漫长历史过程中的重要一环。官场游戏贯穿始终，无休无止。看不见尽头的君臣博弈，就像是一场一个人对付百人千人的车轮大战。

		<td height="30" valign="middle" class="song">在朱元璋平定天下之前，他听说自己的对手张士诚住在深宫里养尊处优，疏于政事，就曾发过一通感慨。这个来自社会最底层的草根皇帝说：“我诸事无不经心，法不轻恕，尚且有人瞒我。张九四（士诚）终岁不出门，不理政事，岂不着人瞒！”言下之意，是说老子天天像防贼一样防着这些官员，还是被当成冤大头忽悠。
